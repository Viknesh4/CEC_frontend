<div class="suggestion-container bg-white shadow rounded p-4 mx-auto">
  <div class="d-flex justify-content-center">
    <h5 class="text-center text-muted border-bottom pb-3 mb-4">Suggestion Forum</h5>
  </div><!-- Sleek header -->

  <!-- Suggestion Form -->
  <form (ngSubmit)="submitSuggestion()" [formGroup]="suggestionForm" class="form-container">
    <!-- Title -->
    <div class="form-group mb-3">
      <label for="title" class="form-label">Title</label>
      <input
        type="text"
        id="title"
        formControlName="title"
        class="form-control"
        placeholder="Enter a title for your suggestion"
      />
      <div *ngIf="suggestionForm.get('title')?.invalid && suggestionForm.get('title')?.touched" class="text-danger">
        Title is required.
      </div>
    </div>

    <!-- Description -->
    <div class="form-group mb-4">
      <label for="description" class="form-label">Description</label>
      <textarea
        id="description"
        formControlName="description"
        class="form-control"
        rows="5"
        placeholder="Describe your suggestion in detail"
      ></textarea>
      <div *ngIf="suggestionForm.get('description')?.invalid && suggestionForm.get('description')?.touched" class="text-danger">
        Description is required.
      </div>
    </div>

    <!-- Submit Button -->
    <div class="text-center">
      <button type="submit" class="btn btn-outline-secondary px-5" [disabled]="suggestionForm.invalid">
        Submit Suggestion
      </button>
    </div>
  </form>

  <!-- Suggestions List -->

      </li>
    </ul>
  </div> -->
</div>
