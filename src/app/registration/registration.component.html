<div class="card shadow-lg rounded-xl p-6 max-w-lg mx-auto">
  <h2 class="text-center text-primary mb-6">Registration</h2>
  <form [formGroup]="registrationForm" (ngSubmit)="registerUser()">
    
    <!-- Name Field -->
    <div class="form-floating mb-4">
      <input type="text" id="name" formControlName="name" placeholder="Enter your name" class="form-control shadow-sm" />
      <label for="name">Name</label>
      <div *ngIf="registrationForm.get('name')?.touched && registrationForm.get('name')?.invalid" class="text-danger small">
        Name is required.
      </div>
    </div>

    <!-- Email Field -->
    <div class="form-floating mb-4">
      <input type="email" id="email" formControlName="email" placeholder="Enter your email" class="form-control shadow-sm" />
      <label for="email">Email</label>
      <div *ngIf="registrationForm.get('email')?.touched && registrationForm.get('email')?.invalid" class="text-danger small">
        Enter a valid email.
      </div>
    </div>

    <!-- Phone Number Field -->
    <div class="form-floating mb-4">
      <input type="text" id="phoneNumber" formControlName="phone_number" placeholder="Enter your phone number" class="form-control shadow-sm" />
      <label for="phoneNumber">Phone Number</label>
      <div *ngIf="registrationForm.get('phone_number')?.touched && registrationForm.get('phone_number')?.invalid" class="text-danger small">
        Please enter a valid phone number.
      </div>
    </div>

    <!-- Password Field -->
    <div class="form-floating mb-4">
      <input type="password" id="password" formControlName="password" placeholder="Enter a password" class="form-control shadow-sm" />
      <label for="password">Password</label>
      <div *ngIf="registrationForm.get('password')?.touched && registrationForm.get('password')?.invalid" class="text-danger small">
        Password must be at least 8 characters.
      </div>
    </div>

    <!-- Confirm Password Field -->
    <div class="form-floating mb-4">
      <input type="password" id="confirmPassword" formControlName="confirmPassword" placeholder="Confirm your password" class="form-control shadow-sm" />
      <label for="confirmPassword">Confirm Password</label>
      <div *ngIf="registrationForm.errors?.['mismatch'] && registrationForm.get('confirmPassword')?.touched" class="text-danger small">
        Passwords do not match.
      </div>
    </div>

    <!-- Submit Button -->
    <button type="submit" class="btn btn-outline-primary w-100 mt-4 py-2 rounded-lg transition-all duration-300 hover:bg-primary hover:text-white border-2" [disabled]="!registrationForm.valid">
      Register
    </button>
  </form>
</div>
