<div class="mt-5" >
    <h5 class="fw-semibold text-center mb-4">Query Information</h5>
    <div class="table-responsive">
      <table class="table table-hover table-striped align-middle">
        <thead class="table-dark">
          <tr>
            <th>Query ID</th>
            <th>Customer Name</th>
            <th>Query Description</th>
            <th>Status</th>
            <th>Priority</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let query of tickets">
            <td>{{ query.query_id }}</td>
            <td>{{ query.customer_name }}</td>
            <td>{{ query.query_description }}</td>
            <td>{{ query.status }}</td>
            <td>
              {{ 
                query.priority === 1 ? 'High' : 
                query.priority === 2 ? 'Medium' : 
                query.priority === 3 ? 'Low' : 'Unknown' 
              }}
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
