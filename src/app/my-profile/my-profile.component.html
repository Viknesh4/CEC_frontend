<div class="card mx-auto shadow-lg" style="width: 24rem; border-radius: 15px; overflow: hidden;">
  <!-- User Image -->
  <div class="text-center bg-gradient" style="background: linear-gradient(135deg, #6a11cb, #2575fc); padding: 30px;">
    <img
      src="..//assets/image/userlogoprofile.svg"
      alt="User Image"
      class="rounded-circle border border-3 border-light"
      style="width: 120px; height: 120px; object-fit: cover;"
    />
    <h5 class="text-dark mt-3">{{ user.name }}</h5>
  </div>

  <!-- User Details -->
  <div class="card-body">
    <h6 class="card-title text-secondary text-center mb-4">User Information</h6>
    <ul class="list-group list-group-flush mb-3">
      <li class="list-group-item">
        <strong class="text-dark">User Id:</strong> <span class="float-end text-muted">{{ user.user_id }}</span>
      </li>
      <li class="list-group-item">
        <strong class="text-dark">Email:</strong> <span class="float-end text-muted">{{ user.email }}</span>
      </li>
      <li class="list-group-item">
        <strong class="text-dark">Mobile Number:</strong> <span class="float-end text-muted">{{ user.phone_number }}</span>
      </li>
    </ul>
    <div class="d-grid gap-2">
      <button class="btn btn-outline-primary" data-bs-toggle="modal" data-bs-target="#editProfileModal">Edit Profile</button>
      <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#editpasswordModal">
        Update Password
      </button>
    </div>
  </div>
</div>

<!-- Edit Profile Modal -->
<div class="modal fade mt-5" id="editProfileModal" tabindex="-1" aria-labelledby="editProfileModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="editProfileModalLabel">Edit Profile</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" style=" background-color: white;"></button>
      </div>
      <div class="modal-body">
        <form (ngSubmit)="updateProfile(user.user_id)">
          <div class="mb-3 pop_card">
            <label for="name" class="form-label">Name</label>
            <input type="text" id="name" [(ngModel)]="user.name" name="name" class="form-control" />
          </div>
          <div class="mb-3 pop_card">
            <label for="email" class="form-label">Email</label>
            <input type="email" id="email" [(ngModel)]="user.email" name="email" class="form-control" />
          </div>
          <div class="mb-3 pop_card">
            <label for="phone_number" class="form-label">Mobile Number</label>
            <input type="text" id="phone_number" [(ngModel)]="user.phone_number" name="phone_number" class="form-control" />
          </div>
          <div class="text-center" style="margin-top: 30px; margin-bottom: 20px;">
            <button type="submit" class="btn btn-outline-primary w-50">Save Changes</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>


<!-- Button trigger modal -->


<!-- Modal -->
<div class="modal fade" id="editpasswordModal" tabindex="-1" aria-labelledby="editpasswordModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content update_card">
      <div class="modal-header">
        <h5 class="modal-title" id="editpasswordModalLabel">Change Password</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" style=" background-color: white;"></button>
      </div>
      <div class="modal-body" style="padding: 40px;">
        <form id="passwordForm">
          <div class="mb-3">
            <label for="currentPassword">Your Password:</label>
            <input
              type="password"
              id="currentPassword"
              [(ngModel)]="currentPassword"
              name="currentPassword"
              class="form-control"
            />
          </div>
          <div class="mb-3">
            <label for="newPassword">New Password:</label>
            <input
              type="password"
              id="newPassword"
              [(ngModel)]="newPassword"
              name="newPassword"
              class="form-control"
            />
          </div>
          <div class="mb-3">
            <label for="confirmPassword">Confirm New Password:</label>
            <input
              type="password"
              id="confirmPassword"
              [(ngModel)]="confirmPassword"
              name="confirmPassword"
              class="form-control"
            />
          </div>
          <div class="text-danger" id="errorMessage">{{ errorMessage }}</div>
        </form>
      </div>
      <div class="modal-footer text-center">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button type="button" class="btn btn-primary" (click)="changePassword(user.user_id)">Submit</button>
      </div>
    </div>
  </div>
</div>

<div *ngIf="showPopup" class="popup-container">
  <div class="popup-content" [ngClass]="isSuccess ? 'success' : 'error'">
    <span class="popup-icon">
      <i *ngIf="isSuccess" class="fas fa-check-circle"></i>
      <i *ngIf="!isSuccess" class="fas fa-exclamation-circle"></i>
    </span>
    <div class="popup-message">
      <p>{{ popupMessage }}</p>
    </div>
  </div>
</div>
